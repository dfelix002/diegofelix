<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkilatris Ovilasyon | Purecove</title>
    <style>
        /* CSS: Estil Modèn */
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('fotoovil/ovul.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        h1 { 
            color: #c2185b; 
            font-size: 28px; 
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        label { 
            display: block; 
            margin-top: 20px; 
            text-align: left; 
            color: #333; 
            font-weight: 600; 
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #c2185b;
            outline: none;
            box-shadow: 0 0 8px rgba(194, 24, 91, 0.2);
        }

        .btn-kalkile {
            width: 100%;
            background: linear-gradient(135deg, #d81b60, #ad1457);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            margin-top: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            transition: 0.3s;
        }

        .btn-kalkile:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.4);
        }

        #rezilta {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            background-color: rgba(252, 228, 236, 0.8);
            color: #d81b60;
            border: 1px solid #f8bbd0;
            animation: fadeIn 0.6s ease-out;
        }

        /* Seksyon Abone */
        .subscription {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
        }

        .subscription p {
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
        }

        .btn-abone {
            background: #333;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-abone:hover {
            background: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kalkilatris Ovilasyon</h1>
    <p class="subtitle">Pa <strong>Purecove</strong></p>

    <label for="datReg">Premye jou dènye règ ou:</label>
    <input type="date" id="datReg">

    <label for="direSik">Konbyen jou sik ou a dire? (Egz: 28)</label>
    <input type="number" id="direSik" value="28">

    <button class="btn-kalkile" onclick="kalkile()">Kalkile Kounye a</button>

    <div id="rezilta">
        <p id="jouOvilasyon"></p>
        <p id="feneFetil" style="font-size: 14px; font-weight: bold; border-top: 1px solid #f8bbd0; padding-top: 10px;"></p>
    </div>

    <div class="subscription">
        <p>Resevwa konsèy sante ak òf Purecove nan imèl ou</p>
        <input type="email" id="emailUser" placeholder="Antre imèl ou...">
        <button class="btn-abone" onclick="abone()">Mwen vle abone</button>
    </div>
</div>

<script>
    function kalkile() {
        const datInput = document.getElementById('datReg').value;
        const direSik = parseInt(document.getElementById('direSik').value);
        const divRezilta = document.getElementById('rezilta');

        if (!datInput) {
            alert("Tanpri chwazi yon dat.");
            return;
        }

        let dat = new Date(datInput);
        let jouOvil = new Date(dat);
        jouOvil.setDate(dat.getDate() + (direSik - 14));

        let komanseFetil = new Date(jouOvil);
        komanseFetil.setDate(jouOvil.getDate() - 3);
        
        let fenFetil = new Date(jouOvil);
        fenFetil.setDate(jouOvil.getDate() + 1);

        const opsyon = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('jouOvilasyon').innerHTML = "Jou ovilasyon ou pwobab: <br><strong style='font-size: 20px;'>" + jouOvil.toLocaleDateString('ht-HT', opsyon) + "</strong>";
        document.getElementById('feneFetil').innerText = "Fenèt fètil: " + komanseFetil.toLocaleDateString('ht-HT', {day:'numeric', month:'short'}) + " a " + fenFetil.toLocaleDateString('ht-HT', {day:'numeric', month:'short', year: 'numeric'});

        divRezilta.style.display = 'block';
    }

    function abone() {
        const imel = document.getElementById('emailUser').value;
        if (imel === "" || !imel.includes("@")) {
            alert("Tanpri antre yon imèl valid.");
        } else {
            alert("Mèsi! Ou pral resevwa nouvèl Purecove byento nan: " + imel);
            document.getElementById('emailUser').value = "";
        }
    }
</script>

</body>
</html>
